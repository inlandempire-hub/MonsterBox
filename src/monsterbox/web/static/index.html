function deleteEntry(cat, i) { captureEdits(); editState[cat].splice(i, 1); renderEdit(); }

function captureEdits() {
  const sb = editState, v = (id) => { const el = $(id); return el ? el.value : undefined; };
  CATS.forEach(([cat]) => (sb[cat]||[]).forEach((a,i) => {
    const n = v(`e_${cat}_${i}_name`); if (n !== undefined) a.name = n;
    const d = v(`e_${cat}_${i}_desc`); if (d !== undefined) a.raw_text = d;
    const th = v(`e_${cat}_${i}_tohit`);
    if (th !== undefined) {
      if (th === "") a.attack = null;
      else { if (!a.attack) a.attack = { kind:"melee_weapon", to_hit:null, reach_ft:null, range_ft:null, targets:"one target" };
             a.attack.to_hit = parseInt(th, 10); }
    }
    const dm = v(`e_${cat}_${i}_dmg`);
    if (dm !== undefined) a.damage = parseDamage(dm);
  }));
}

async function saveEdit() {
  captureEdits();
  const sb = editState;
  sb.name = $("e_name").value.trim() || sb.name;
  sb.size = $("e_size").value.trim() || null;
  sb.creature_type = $("e_type").value.trim() || null;
  sb.alignment = $("e_align").value.trim() || null;
  sb.armor_class = parseInt($("e_ac").value, 10) || sb.armor_class;
  sb.hit_points = parseInt($("e_hp").value, 10) || sb.hit_points;
  sb.challenge_rating = $("e_cr").value.trim() || null;
  ABILS.forEach(([l,c,f]) => { const x = parseInt($("e_ab_"+f).value, 10); if (!isNaN(x)) sb.abilities[f] = x; });
  sb.saving_throws = parseBonuses($("e_saves").value);
  sb.skills = parseBonuses($("e_skills").value);
  const sen = parseSenses($("e_senses").value); sb.senses = sen.senses; sb.passive_perception = sen.passive;
  sb.languages = parseList($("e_langs").value);
  const r = await fetch("/api/statblocks/" + sb.id, {
    method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(sb) });
  if (!r.ok) { let m=""; try { m = (await r.json()).error || ""; } catch(e){} alert("Save failed (" + r.status + "). " + m); return; }
  editState = null;
  isNewEntry = false;
  selected = sb.id;
  // refurl the edit form, then unfurl the saved stat block
  closeScroll(() => showSheet(sb.id));
}

// Save the current edits as a brand-new entry, leaving the original untouched.
// (Give editState a fresh id, then save normally — the server upserts by id.)
async function saveEditAsNew() {
  if (!editState) return;
  const wasExisting = !isNewEntry;
  editState.id = (window.crypto && crypto.randomUUID)
    ? crypto.randomUUID() : "sb-" + Date.now();
  // append "(Copy)" so the modified version is distinguishable from the original
  if (wasExisting) {
    const cur = ($("e_name").value || editState.name || "").trim();
    if (cur && !/\(copy\)/i.test(cur)) $("e_name").value = cur + " (Copy)";
  }
  isNewEntry = true;            // so cancel/flow treat it as new from here
  await saveEdit();
}

// client-side parsers (mirror the server, for the edit form)
function parseBonuses(text) {
  const out = {};
  (text||"").split(",").forEach(p => { const m = p.match(/(.+?)\s*([+-]\d+)/); if (m) out[m[1].trim()] = parseInt(m[2],10); });
  return out;
}
function parseList(text) {
  const t = (text||"").trim();
  if (!t || ["none","-","—","–"].includes(t.toLowerCase())) return [];
  return t.split(/[,;]/).map(s => s.trim()).filter(Boolean);
}
function parseSenses(text) {
  const senses = {}; let passive = null;
  (text||"").split(",").forEach(p => {
    p = p.trim();
    const pm = p.match(/passive Perception\s+(\d+)/i);
    const m = p.match(/^([A-Za-z]+)\s+(\d+)/);
    if (pm) passive = parseInt(pm[1],10);
    else if (m) senses[m[1].toLowerCase()] = parseInt(m[2],10);
  });
  return { senses, passive };
}
function damageToText(damage) {
  return (damage||[]).map(c => `${c.dice||""}${c.bonus ? (c.bonus>0?"+":"")+c.bonus : ""} ${c.damage_type||""}`.trim()).join(", ");
}
function parseDamage(text) {
  if (!text || !text.trim()) return [];
  return (text).split(",").map(p => {
    const m = p.match(/(\d+d\d+)\s*([+-]\d+)?\s*([A-Za-z]+)?/);
    if (!m) return null;
    return { dice: m[1], bonus: m[2] ? parseInt(m[2],10) : 0, average: null,
             damage_type: m[3] ? m[3].toLowerCase() : null, notes: null };
  }).filter(Boolean);
}

const blankSheet = () => {
  // no scroll when nothing is selected — just the central transparent label
  $("scrollcontent").innerHTML = "";
  showEmptyLabel();
};

// in-app confirm modal — returns a Promise<bool>, replacing the native popup
let _confirmResolve = null;
function uiConfirm(message, okLabel) {
  $("confirmMsg").textContent = message;
  $("confirmOk").textContent = okLabel || "Delete";
  $("confirmModal").style.display = "flex";
  return new Promise(resolve => { _confirmResolve = resolve; });
}
(function initConfirmModal() {
  const close = (val) => {
    $("confirmModal").style.display = "none";
    if (_confirmResolve) { _confirmResolve(val); _confirmResolve = null; }
  };
  $("confirmOk").onclick = () => close(true);
  $("confirmCancel").onclick = () => close(false);
  $("confirmModal").addEventListener("click", e => {
    if (e.target.id === "confirmModal") close(false);   // click backdrop = cancel
  });
})();

async function delMon(id) {
  const m = library.find(x => x.id === id);
  const name = m ? m.name : "this monster";
  if (!await uiConfirm(`Delete “${name}” from the compendium?`)) return;
  const r = await fetch("/api/statblocks/" + id, { method: "DELETE" });
  if (!r.ok) { alert("Delete failed (" + r.status + "). Try restarting MonsterBox."); return; }
  if (selected === id) { selected = null; blankSheet(); }
  loadLibrary();
}

async function clearLibrary() {
  if (!await uiConfirm("Delete ALL monsters from the compendium? This cannot be undone.",
                       "Delete All")) return;
  const r = await fetch("/api/statblocks", { method: "DELETE" });
  if (!r.ok) { alert("Clear failed (" + r.status + "). Try restarting MonsterBox."); return; }
  selected = null;
  blankSheet();
  loadLibrary();
}

async function removeCombatant(id) {
  const r = await fetch("/api/encounter/remove", {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ combatant_id: id })
  });
  if (!r.ok) { alert("Remove failed (" + r.status + "). Try restarting MonsterBox."); return; }
  loadTracker();
}

async function roll(sid, action, kind) {
  const body = { statblock_id: sid, action_name: action, kind };
  if (kind === "attack") { const a = _attackAdv(); if (a) body.advantage = a; }
  await post("/api/roll", body);
  await loadLog();
}

const CONDITIONS = ["Blinded","Charmed","Concentration","Deafened","Exhaustion",
  "Frightened","Grappled","Incapacitated","Invisible","Paralyzed","Petrified",
  "Poisoned","Prone","Restrained","Stunned","Unconscious"];

// How each condition affects a creature:
//   lines     — DM-facing effect text (shown in the run-card note + sheet banner)
//   disables  — stat-block sections greyed out on the affected creature's sheet
//   includes  — other conditions whose effects also apply (e.g. Paralyzed → Incapacitated)
//   speedZero — the creature's Speed becomes 0 (struck through on the sheet)
const CONDITION_EFFECTS = {
  "Blinded": {
    selfAttackDis: true,
    lines: ["Can't see; automatically fails any ability check that requires sight.",
            "Attack rolls against it have advantage; its attack rolls have disadvantage."],
  },
  "Charmed": {
    lines: ["Can't attack the charmer or target them with harmful abilities or magical effects.",
            "The charmer has advantage on ability checks to interact socially with it."],
  },
  "Concentration": {
    lines: ["Maintaining Concentration on a spell.",
            "Taking damage forces a Constitution save (DC 10 or half the damage, whichever is higher) or the spell ends."],
  },
  "Deafened": {
    lines: ["Can't hear; automatically fails any ability check that requires hearing."],
  },
  "Exhaustion": {
    lines: ["Level 1: Disadvantage on ability checks.",
            "Level 2: Speed halved.",
            "Level 3: Disadvantage on attack rolls and saving throws.",
            "Level 4: Hit point maximum halved.",
            "Level 5: Speed reduced to 0.",
            "Level 6: Death.",
            "(Cumulative; this chip doesn't track the level, so rolls aren't auto-adjusted.)"],
  },
  "Frightened": {
    selfAttackDis: true, selfCheckDis: true,
    lines: ["Disadvantage on ability checks and attack rolls while the source of fear is in line of sight.",
            "Can't willingly move closer to the source of its fear."],
  },
  "Grappled": {
    speedZero: true,
    lines: ["Speed becomes 0; can't benefit from any bonus to its speed.",
            "Ends if the grappler is Incapacitated, or if it's removed from the grappler's reach."],
  },
  "Incapacitated": {
    disables: ["actions", "bonus_actions", "reactions", "legendary_actions"],
    lines: ["Can't take Actions, Bonus Actions, or Reactions.",
            "Loses Concentration. Can move but can't Dash."],
  },
  "Invisible": {
    selfAttackAdv: true,
    lines: ["Impossible to see without magic or a special sense; heavily obscured for hiding.",
            "Attack rolls against it have disadvantage; its attack rolls have advantage."],
  },
  "Paralyzed": {
    includes: ["Incapacitated"], autoFailStrDexSave: true,
    lines: ["Incapacitated; can't move or speak.",
            "Automatically fails Strength and Dexterity saving throws.",
            "Attack rolls against it have advantage.",
            "Any hit from within 5 feet is a critical hit."],
  },
  "Petrified": {
    includes: ["Incapacitated"], autoFailStrDexSave: true,
    lines: ["Transformed into a solid substance; incapacitated, can't move or speak, unaware of surroundings.",
            "Attack rolls against it have advantage.",
            "Automatically fails Strength and Dexterity saving throws.",
            "Resistance to all damage; immune to poison and disease (existing ones suspended, not neutralised)."],
  },
  "Poisoned": {
    selfAttackDis: true, selfCheckDis: true,
    lines: ["Disadvantage on attack rolls and ability checks."],
  },
  "Prone": {
    selfAttackDis: true,
    lines: ["Only movement option is to crawl, unless it stands up (ending the condition).",
            "Disadvantage on its attack rolls.",
            "Attacks against it have advantage from within 5 feet, otherwise disadvantage."],
  },
  "Restrained": {
    speedZero: true, selfAttackDis: true, dexSaveDis: true,
    lines: ["Speed becomes 0; can't benefit from any bonus to its speed.",
            "Attack rolls against it have advantage; its attack rolls have disadvantage.",
            "Disadvantage on Dexterity saving throws."],
  },
  "Stunned": {
    includes: ["Incapacitated"], autoFailStrDexSave: true,
    lines: ["Incapacitated; can't move, and can speak only falteringly.",
            "Automatically fails Strength and Dexterity saving throws.",
            "Attack rolls against it have advantage."],
  },
  "Unconscious": {
    includes: ["Incapacitated"], speedZero: true, autoFailStrDexSave: true,
    lines: ["Incapacitated; can't move or speak, unaware of surroundings.",
            "Drops whatever it's holding and falls Prone.",
            "Automatically fails Strength and Dexterity saving throws.",
            "Attack rolls against it have advantage.",
            "Any hit from within 5 feet is a critical hit."],
  },
};

// Resolve a condition's full effect, folding in any `includes` (e.g. Paralyzed
// pulls in Incapacitated's disabled sections).
function condEffect(cn) {
  const e = CONDITION_EFFECTS[cn];
  if (!e) return null;
  const disables = new Set(e.disables || []);
  (e.includes || []).forEach(inc => {
    const ie = CONDITION_EFFECTS[inc];
    if (ie) (ie.disables || []).forEach(d => disables.add(d));
  });
  return { lines: e.lines || [], disables, speedZero: !!e.speedZero };
}

async function spawn(sid) { await post("/api/encounter/spawn", { statblock_id: sid }); loadTracker(); }
async function nextTurn() { await post("/api/encounter/next"); loadTracker(); }
async function clearEnc() { await post("/api/encounter/clear"); loadTracker(); }

async function addPlayer() {
  const name = $("pc_name").value.trim();
  if (!name) { alert("Enter a player name."); return; }
  await post("/api/encounter/add-player", {
    name,
    initiative: parseInt($("pc_init").value || "0", 10),
    max_hp: parseInt($("pc_hp").value || "0", 10),
  });
  $("pc_name").value = ""; $("pc_init").value = ""; $("pc_hp").value = "";
  loadTracker();
}
async function addCondition(id, name) {
  if (!name) return;
  await post("/api/encounter/condition", { combatant_id: id, name, action: "add" });
  loadTracker();
}
async function removeCondition(id, name) {
  await post("/api/encounter/condition", { combatant_id: id, name, action: "remove" });
  loadTracker();
}

async function saveEncounter() {
  const name = prompt("Save this encounter as:", "Encounter");
  if (!name) return;
  await post("/api/encounter/save", { name });
  loadEncounterList();
}
async function loadEncounterList() {
  const list = await api("/api/encounters");
  $("encsel").innerHTML = '<option value="">Load Encounter…</option>' +
    list.map(e => `<option value="${e.id}">${esc(e.name)} (${e.combatants})</option>`).join("");
}
async function onEncSelect(id) {
  if (!id) return;
  await post("/api/encounter/load", { encounter_id: id });
  loadTracker();
}
async function deleteSelectedEncounter() {
  const id = $("encsel").value;
  if (!id) { alert("Pick a saved encounter from the list first."); return; }
  if (!await uiConfirm("Delete this saved encounter?")) return;
  await fetch("/api/encounters/" + id, { method: "DELETE" });
  loadEncounterList();
}
async function applyDmg(cid, inputId, sign) {
  const amt = parseInt($(inputId).value || "0", 10) * sign;
  if (!amt) return;
  await post("/api/encounter/damage", { combatant_id: cid, amount: amt });
  loadTracker();
}

// ---- encounter: compact planner (right) vs expanded run view (centre) ----
let encounterExpanded = false;

async function loadTracker() {
  const enc = await api("/api/encounter");
  renderPlannerList(enc);
  if (encounterExpanded) renderRunCards(enc);
}

// compact list for the collapsed planner: just who's in the fight
function renderPlannerList(enc) {
  const el = $("plannerlist");
  if (!el) return;
  if (!enc.combatants.length) {
    el.innerHTML = '<div class="planner-empty">Empty — add creatures from a stat block, then Expand to run it.</div>';
    return;
  }
  el.innerHTML = enc.combatants.map(c => `
    <div class="planner-row">
      <span class="pname">${esc(c.display_name)}${c.is_player?'<span class="pcbadge">PC</span>':''}</span>
      <button class="x" title="Remove" onclick="removeCombatant('${c.id}')">✕</button>
    </div>`).join("");
}

// full run view (HP / initiative / conditions) for the expanded centre panel
function renderRunCards(enc) {
  const rt = $("runtracker");
  if (rt === null) return;
  const round = $("round");
  if (round) round.textContent = enc.combatants.length ? "Round " + Math.max(1, enc.round+1) : "";
  rt.innerHTML = enc.combatants.map((c, i) => {
    const pct = Math.max(0, Math.round(100 * c.current_hp / Math.max(1, c.max_hp)));
    const iid = "dmg_" + c.id;
    const conds = (c.conditions || []).map(cn =>
      `<span class="cond" title="Remove ${esc(cn)}"
         onclick="removeCondition('${c.id}', '${esc(cn)}')">${esc(cn)} ✕</span>`).join("");
    // how the active conditions affect this creature
    const effNotes = (c.conditions || [])
      .filter(cn => CONDITION_EFFECTS[cn])
      .map(cn => `<div class="condeffect"><b>${esc(cn)}:</b> ${esc(condEffect(cn).lines.join(" "))}</div>`)
      .join("");
    const sbBtn = c.statblock_id
      ? `<button class="btn tiny" title="Open Stat Block"
           onclick="openCombatantSheet('${c.statblock_id}','${c.id}')">Stat Block</button>` : "";
    return `<div class="cb ${i===enc.active_index && enc.combatants.length?'active':''}">
      <div class="top"><b>${esc(c.display_name)}${c.is_player?'<span class="pcbadge">PC</span>':''}</b>
        <span>${sbBtn}<span class="init">${c.initiative ?? "-"}</span>
        <button class="x" title="Remove" onclick="removeCombatant('${c.id}')">✕</button></span></div>
      <div class="hpbar"><div class="${c.is_player ? "hp-pc" : "hp-mob"}" style="width:${pct}%"></div></div>
      <div class="hprow"><span>${c.current_hp}/${c.max_hp} HP · AC ${c.armor_class}</span>
        <input id="${iid}" type="number" placeholder="0" />
        <button class="btn" onclick="applyDmg('${c.id}','${iid}',1)">−HP</button>
        <button class="btn" onclick="applyDmg('${c.id}','${iid}',-1)">+HP</button>
      </div>
      <div class="conds">${conds}
        <select class="condsel" onchange="addCondition('${c.id}', this.value); this.value='';">
          <option value="">＋ Condition</option>
          ${CONDITIONS.map(x => `<option>${x}</option>`).join("")}
        </select>
      </div>${effNotes}</div>`;
  }).join("") || '<div class="planner-empty">No combatants yet. Add creatures from a stat block.</div>';
}

function toggleEncounterExpand() {
  encounterExpanded = !encounterExpanded;
  const run = $("encounterrun"), planner = $("plannerpanel");
  if (encounterExpanded) {
    // take over the centre: hide the scroll / label, hide the planner; log fills
    if (_scrollAnim) { clearTimeout(_scrollAnim); _scrollAnim = null; }
    _wrap().style.display = "none";
    $("emptylabel").style.display = "none";
    run.style.display = "flex";
    planner.style.display = "none";
    loadTracker();
  } else {
    run.style.display = "none";
    planner.style.display = "";
    // restore the centre to the selected stat block (or the empty label)
    if (selected) showSheet(selected); else showEmptyLabel();
    loadTracker();
  }
}

// open a combatant's stat block from the run view, carrying its active
// conditions (so their effects show) and a "Back to Encounter" button
async function openCombatantSheet(sid, cid) {
  const enc = await api("/api/encounter");
  const c = enc.combatants.find(x => x.id === cid);
  await showSheet(sid, { conditions: c ? c.conditions : [], fromCombatant: cid });
}
function backToEncounter() {
  if (!encounterExpanded) toggleEncounterExpand();   // re-expand the run view
}

async function clearLog() {
  const r = await fetch("/api/rolls", { method: "DELETE" });
  if (!r.ok) { alert("Clear log failed (" + r.status + ")."); return; }
  loadLog();
}

async function loadLog() {
  const rolls = await api("/api/rolls");
  const log = $("log");
  log.innerHTML = rolls.map(r => `
    <div class="roll">
      <div class="rollinfo">
        <div class="src">${esc(r.source)}</div>
        <div class="rtitle">${esc(r.label)}${r.advantage ? ` <span class="advtag">(${r.advantage === "advantage" ? "Adv" : "Disadv"})</span>` : ""}</div>
        <div class="det">${esc(r.expression)} → [${r.dice_results.join(", ")}]</div>
      </div>
      <div class="tot">${r.total}</div>
    </div>`).join("");
  log.scrollTop = log.scrollHeight;   // keep the newest roll (bottom) in view
}

// ---- PDF import (drag-and-drop or browse) ----
const drop = $("drop"), fileInput = $("file");
drop.addEventListener("click", () => fileInput.click());
["dragenter", "dragover"].forEach(e =>
  drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.add("over"); }));
["dragleave", "drop"].forEach(e =>
  drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.remove("over"); }));
drop.addEventListener("drop", ev => {
  const f = ev.dataTransfer.files[0];
  if (f) uploadPdf(f);
});
fileInput.addEventListener("change", () => {
  if (fileInput.files[0]) uploadPdf(fileInput.files[0]);
});

async function uploadPdf(file) {
  const msg = $("importmsg");
  msg.className = "busy";
  msg.textContent = "Starting…";
  const fd = new FormData();
  fd.append("file", file);
  let start;
  try {
    start = await (await fetch("/api/import/start", { method: "POST", body: fd })).json();
  } catch (e) {
    msg.className = ""; msg.textContent = "Import failed: " + e; return;
  }
  if (start.error) { msg.className = ""; msg.textContent = "Error: " + start.error; return; }
  pollImport(start.job_id, file.name);
}

async function pollImport(jobId, name) {
  const msg = $("importmsg");
  let s;
  try {
    s = await (await fetch("/api/import/status/" + jobId)).json();
  } catch (e) {
    msg.className = ""; msg.textContent = "Lost contact with the import."; return;
  }
  if (!s.finished) {
    const pct = s.total ? Math.round(100 * s.current / s.total) : 0;
    const label = s.total
      ? `Reading ${esc(name)}… page ${s.current}/${s.total}`
      : `Reading ${esc(name)}…`;
    msg.className = "busy";
    msg.innerHTML = `${label}<div class="pbar"><div style="width:${pct}%"></div></div>`;
    setTimeout(() => pollImport(jobId, name), 600);
    return;
  }
  msg.className = "";
  if (s.error) { msg.textContent = "Import failed: " + s.error; return; }
  const imported = s.imported || [];
  const count = imported.length;
  const names = imported.map(x => x.name).join(", ") || "(nothing recognised)";
  const low = imported.some(x => x.confidence < 0.6);
  // Show only the count; the full named list lives in the hover tooltip to keep things clean.
  const noun = count === 1 ? "creature" : "creatures";
  msg.innerHTML = `Imported <b class="impcount" title="${escAttr(names)}">${count}</b> ${noun} `
    + `from ${esc(name)} <span style="color:var(--dim)">(${s.input_kind || ""})</span>`
    + (low ? ' <span class="warn">(low confidence, check the sheet)</span>' : '');
  fileInput.value = "";
  loadLibrary();
}

// ---- light / dark mode toggle ----
// ---- mobile slide-out drawers (no-ops visually on desktop) ----
function toggleDrawer(side) {
  const el = $(side === 'left' ? 'leftside' : 'rightside');
  const other = $(side === 'left' ? 'rightside' : 'leftside');
  const opening = !el.classList.contains('open');
  other.classList.remove('open');
  el.classList.toggle('open', opening);
  $('mscrim').classList.toggle('show', opening);
}
function closeDrawers() {
  $('leftside').classList.remove('open');
  $('rightside').classList.remove('open');
  $('mscrim').classList.remove('show');
}

function toggleMode() {
  // freeze element transitions for this frame so every panel switches at once
  document.body.classList.add('no-anim');
  const dark = document.body.classList.toggle('dark');
  localStorage.setItem('sf-dark', dark ? '1' : '0');
  // re-enable transitions after the colour change has painted
  requestAnimationFrame(() =>
    requestAnimationFrame(() => document.body.classList.remove('no-anim')));
  // icon + knob position handled entirely by CSS (::after on #modetoggle)
}
// restore saved preference
(function() {
  if (localStorage.getItem('sf-dark') === '1') {
    document.body.classList.add('dark');
  }
})();

// Boot sequence: wallpaper only → title card (in 1.5s / hold 2s / out 1.5s = 5s)
// → full UI fades in over 1s.
(function() {
  const sp = $("splash");
  setTimeout(() => document.body.classList.remove("booting"), 5000);  // UI fades in (CSS 1s)
  setTimeout(() => { if (sp) sp.remove(); }, 5200);                   // card has faded out
})();

// Heartbeat: lets the windowless launcher's server auto-close when this page is
// closed. Starts immediately (independent of the splash). If the server isn't
// running with --shutdown-on-idle (e.g. dev `serve`), the pings are harmless.
(function() {
  const ping = () => fetch("/api/ping", { method: "POST" }).catch(() => {});
  ping();
  setInterval(ping, 4000);
})();

// keep the empty-state hint correct for the current viewport (and on rotate)
(function() {
  const m = window.matchMedia("(max-width: 820px)");
  const set = () => { const e = $("emptylabel");
    if (e) e.textContent = m.matches
      ? "Tap ☰ to open the Compendium"
      : "← Select a monster from the Compendium"; };
  set();
  m.addEventListener("change", set);
})();

loadLibrary(); loadTracker(); loadLog(); loadEncounterList();
</script>
